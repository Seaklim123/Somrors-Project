<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<style>
  /* This class is added by JavaScript to open the cart */
  #cartPopup.active {
      right: 0 !important;
  }
</style>
<body>
  <!-- The Cart Side Panel -->
  <div id="cartPopup" style="position: fixed; top: 0; right: -400px; width: 350px; height: 100%; background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.2); transition: 0.4s; z-index: 1050; padding: 20px; overflow-y: auto;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5>Your Shopping Carttttttttttt</h5>
        <button class="btn btn-sm btn-outline-dark" onclick="closeCart()">Close</button>
    </div>
    
    <div id="cartItems"></div>
    
    <div class="mt-4">
        <h5>Total: <span id="total">$0.00</span></h5>
        <button class="btn btn-danger w-100">Checkouttttttttttttt</button>
    </div>
  </div>



    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/cart.js"></script>

</body>

</html>
